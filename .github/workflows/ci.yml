name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt, clippy, test, bench check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace

      - name: cargo bench (compile check only)
        run: cargo bench -p oxide-engine -- --test

  wasm:
    name: WASM build + drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: "v0.15.0"

      - name: Build oxide-wasm package (compile check, scratch dir)
        working-directory: crates/wasm
        run: wasm-pack build --target web --out-dir /tmp/pkg-check

      # Vercel deploys web/public/pkg as a committed artifact and never runs
      # wasm-pack itself, so a stale binary there would silently ship an old
      # simulation to production with no build failure anywhere. The wasm
      # binary isn't bit-reproducible across builds even from identical
      # source, so we can't diff it directly — instead this hashes the
      # source inputs and compares against the hash recorded alongside the
      # artifact when it was last generated (see scripts/wasm-pkg.sh).
      - name: Verify committed web/public/pkg matches current source
        run: ./scripts/wasm-pkg.sh verify

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    needs: wasm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build Next.js app
        working-directory: web
        run: npm run build
